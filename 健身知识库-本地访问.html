<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身知识库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
            text-align: center;
        }
        
        .status {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .button {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            margin: 10px;
            transition: all 0.3s;
        }
        
        .button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        .info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #2196F3;
        }
        
        .code {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏋️ 健身知识库</h1>
        
        <div class="status success">
            <h2>✅ 服务器正在运行</h2>
            <p>当前页面：可以直接双击打开此HTML文件访问</p>
        </div>
        
        <div class="info">
            <h3>📋 访问方式</h3>
            <p><strong>方式1：</strong>直接双击此HTML文件</p>
            <p><strong>方式2：</strong>使用启动脚本</p>
            <div class="code">启动健身知识库.bat</div>
        </div>
        
        <div class="info">
            <h3> 当前状态</h3>
            <p>✅ 本地HTML文件 - 可直接访问</p>
            <p>⚠️ Vite开发服务器 - 需要解决访问问题</p>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="fitness-knowledge-base/index.html" class="button" id="appLink">
                尝试访问完整版应用
            </a>
        </div>
        
        <div class="info" style="margin-top: 30px;">
            <h3>💡 故障排查</h3>
            <p>如果上面的链接无法访问，请：</p>
            <ol style="margin-left: 20px; margin-top: 10px;">
                <li>关闭所有浏览器窗口</li>
                <li>重新双击"启动健身知识库.bat"</li>
                <li>等待10秒后在浏览器访问：<code>http://localhost:5173/</code></li>
            </ol>
        </div>
    </div>

    <script>
        // 检测是否为本地文件协议
        if (window.location.protocol === 'file:') {
            console.log('当前为本地文件访问模式');
        } else {
            console.log('当前为HTTP访问模式');
        }
        
        // 尝试加载应用
        document.getElementById('appLink').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'fitness-knowledge-base/';
        });
    </script>
</body>
</html>
