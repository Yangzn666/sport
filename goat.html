<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 球王黄佳炀 - 双冠荣耀 🏆💪</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 25%, #24243e 50%, #1a1a2e 75%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            animation: gradientBG 20s ease infinite;
            background-size: 400% 400%;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 英雄区域 */
        .hero {
            text-align: center;
            padding: 80px 20px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            animation: glow 2s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .hero .subtitle {
            font-size: 1.5rem;
            color: #FFD700;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: #FFD700;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.4);
        }

        .stat-card .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .stat-card .number {
            font-size: 3rem;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 10px;
        }

        .stat-card .label {
            font-size: 1.1rem;
            color: #cccccc;
        }

        /* 成就列表 */
        .achievements {
            margin: 60px 0;
        }

        .achievements h2 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 40px;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .achievement-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #FFD700;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .achievement-item:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateX(10px);
        }

        .achievement-item h3 {
            color: #FFD700;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .achievement-item p {
            color: #cccccc;
            line-height: 1.6;
        }

        /* 名言警句 */
        .quotes {
            margin: 60px 0;
            text-align: center;
        }

        .quotes h2 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #FFD700;
        }

        .quote-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid rgba(255, 215, 0, 0.2);
            font-style: italic;
            font-size: 1.3rem;
            color: #FFD700;
            position: relative;
        }

        .quote-card::before {
            content: '"';
            font-size: 4rem;
            position: absolute;
            top: -10px;
            left: 20px;
            color: rgba(255, 215, 0, 0.3);
        }

        /* 返回按钮 */
        .back-button {
            display: inline-block;
            margin: 40px auto;
            padding: 15px 40px;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #000;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .hero .subtitle {
                font-size: 1.2rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 英雄区域 -->
        <div class="hero">
            <h1>🏆 球王黄佳炀 🏆</h1>
            <div class="subtitle">双冠荣耀 · 传奇不朽</div>
            <p style="font-size: 1.2rem; color: #ccc; position: relative; z-index: 1;">
                足球场上的统治者，双冠王的光辉时刻
            </p>
        </div>

        <!-- 统计数据 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">🏆</div>
                <div class="number">2</div>
                <div class="label">冠军头衔</div>
            </div>
            <div class="stat-card">
                <div class="icon">⚽</div>
                <div class="number"></div>
                <div class="label">进球贡献</div>
            </div>
            <div class="stat-card">
                <div class="icon">👑</div>
                <div class="number">1</div>
                <div class="label">球王地位</div>
            </div>
            <div class="stat-card">
                <div class="icon">🔥</div>
                <div class="number">100%</div>
                <div class="label">统治力</div>
            </div>
        </div>

        <!-- 成就列表 -->
        <div class="achievements">
            <h2> 荣耀成就</h2>
            
            <div class="achievement-item">
                <h3>🥇 第一届冠军</h3>
                <p>在激烈的角逐中脱颖而出，展现了无与伦比的球技和领袖气质，带领团队走向胜利!</p>
            </div>
            
            <div class="achievement-item">
                <h3>🥇 第二届冠军</h3>
                <p>卫冕成功!证明了实力不是偶然，而是绝对的统治力。双冠王，传奇诞生!</p>
            </div>
            
            <div class="achievement-item">
                <h3> THE GOAT</h3>
                <p>Greatest Of All Time - 史上最佳!这不是自封，而是所有人公认的球王!</p>
            </div>
        </div>

        <!-- 名言警句 -->
        <div class="quotes">
            <h2>💬 球王语录</h2>
            
            <div class="quote-card">
                我不是在踢球，我是在创造历史!
            </div>
            
            <div class="quote-card">
                双冠只是开始，传奇永不终结!
            </div>
            
            <div class="quote-card">
                球场上的每一分钟，都是我的表演时刻!
            </div>
        </div>

        <!-- 返回按钮 -->
        <div style="text-align: center;">
            <a href="./portal.html" class="back-button">← 返回门户</a>
        </div>
    </div>

    <script>
        // 滚动动画效果
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        });

        document.querySelectorAll('.achievement-item, .quote-card').forEach(el => {
            observer.observe(el);
        });

        // 点击特效
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.style.position = 'fixed';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            ripple.style.width = '10px';
            ripple.style.height = '10px';
            ripple.style.background = 'rgba(255, 215, 0, 0.6)';
            ripple.style.borderRadius = '50%';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'rippleEffect 0.6s ease-out';
            ripple.style.zIndex = '9999';
            document.body.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        });

        // 添加点击特效动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleEffect {
                0% {
                    transform: scale(1);
                    opacity: 1;
                }
                100% {
                    transform: scale(50);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
