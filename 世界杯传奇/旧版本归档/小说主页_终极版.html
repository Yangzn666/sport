陈家乐根本没有看球。他的注意力全在那位女球迷是否回应了他的挥手。就在皮球即将砸中他后脑勺的瞬间，他下意识地缩了一下脖子，脑海里闪过方毅的那句名言：“贝利说过，进球是一种本能，但更是一种表演。你得在千万人中找到那个唯一的‘心动点’。”

“啪！”

皮球精准地磕在了陈家乐的右脚后跟上，发生了一次诡异的折射。它改变了方向，贴着草皮，从诺伊尔的指尖旁滑过，缓缓地滚进了球门。

1:0！

整个体育场陷入了死一般的寂静，随后爆发出了震耳欲聋的欢呼声。那不是对精彩配合的赞美，而是对这种荒诞现实的震惊。

陈家乐转过身，看着网窝里滚动的皮球，脸上露出了标志性的、略带无辜的微笑。他耸了耸肩，仿佛在说：“这也能进？看来我今天出门踩到狗屎运了。”他甚至还有点遗憾，刚才那个挥手的Pose好像没摆好，应该再侧一点脸的。

而在场的另一端，叶泽辉终于停止了颤抖。他看着记分牌，第一次意识到，原来足球，真的可以这样踢。这场惊魂时刻，不仅是中国队的胜利，更是一场关于“非理性足球”的宣言。在那个夜晚，休斯顿的星空下，四个怪才用他们的方式，向世界宣告：逻辑已死，玄学永生。锦鲤附体，天下无敌！` },

            { title: "第三章：死亡之组的突围", content: `（此处为第三章内容：黄佳炀与C罗的跨时空对话，省电模式的精髓，以及千球目标的激励...）` },
            { title: "第四章：宿命的对决（VS 法国）", content: `（此处为第四章内容：姆巴佩的独裁者气场，杨臻宁的声波攻击，以及皇马压力的调侃...）` },
            { title: "第五章：中场休息室的秘密", content: `（此处为第五章内容：方毅与贝利、马拉多纳的往事，陈家乐的T台自信觉醒...）` },
            { title: "第六章：八强战的奇迹（VS 法国）", content: `（此处为第六章内容：黄佳炀的时间静止，叶泽辉的成长弧光...）` },
            { title: "第七章：半决赛的阴影（VS 阿根廷）", content: `（此处为第七章内容：点球大战的心理博弈，梅西的迈阿密度假模式被破解...）` },
            { title: "第八章：决赛前夜的风波", content: `（此处为第八章内容：全球舆论风暴，方毅的量子力学宣言...）` },
            { title: "第九章：巅峰之战（上）", content: `（此处为第九章内容：维尼修斯的桑巴舞步，星际战靴的感官描写...）` },
            { title: "第十章：SIUUU！新王登基", content: `（此处为第十章内容：夺冠瞬间，金色流光，黄佳炀的SIUUU比C罗还帅的热搜...）` }
        ];

        // 生成章节列表
        const listContainer = document.getElementById('chapterList');
        chaptersData.forEach((chapter, index) => {
            const card = document.createElement('div');
            card.className = 'chapter-card';
            card.innerHTML = `
                <div class="chapter-num">${index + 1}</div>
                <div class="chapter-title">${chapter.title.split('：')[1] || chapter.title}</div>
                <div class="chapter-desc">点击阅读完整章节，感受方毅与四皇的传奇征途...</div>
            `;
            card.onclick = () => openReader(index);
            listContainer.appendChild(card);
        });

        // 打开阅读器
        function openReader(index) {
            const overlay = document.getElementById('readerOverlay');
            const content = document.getElementById('readerContent');
            const chapter = chaptersData[index];
            
            // 简单的 Markdown 格式化
            const formattedContent = chapter.content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .split('\n').map(p => `<p>${p}</p>`).join('');
            
            content.innerHTML = `<h1>${chapter.title}</h1>${formattedContent}`;
            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden'; // 禁止背景滚动
        }

        function closeReader() {
            document.getElementById('readerOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // 粒子特效
        for(let i=0; i<50; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = (Math.random() * 10 + 5) + 'px';
            p.style.animationDelay = Math.random() * 10 + 's';
            document.getElementById('particles').appendChild(p);
        }
    </script>
