<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>🏆 中国队世界杯夺冠传奇 - THE GOAT 🚀</title>
    <style>
        :root { --gold: #FFD700; --dark-bg: #0f0c29; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff; overflow-x: hidden; min-height: 100vh;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        
        /* 标题区 */
        .header { text-align: center; padding: 80px 20px; animation: slideDown 1s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
        .header h1 {
            font-size: 4.5em; color: var(--gold); 
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 3px 3px 0px #000;
            letter-spacing: 8px; font-weight: 900; margin-bottom: 20px;
            background: linear-gradient(to right, #FFD700, #FFF, #FFD700);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 1.6em; color: #ccc; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* 3D 章节列表 */
        .chapter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 35px; padding: 40px 0; perspective: 1000px; }
        .chapter-card-container { height: 250px; cursor: pointer; }
        .chapter-card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .chapter-card-container:hover .chapter-card { transform: rotateY(180deg); }
        
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 24px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .card-front {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px);
        }
        .card-back {
            background: linear-gradient(135deg, #FFD700, #B8860B);
            color: #000; transform: rotateY(180deg);
        }
        .chapter-num { font-size: 4em; color: var(--gold); font-weight: 900; opacity: 0.15; position: absolute; right: 20px; top: 10px; }
        .chapter-title { font-size: 1.9em; font-weight: bold; color: #fff; line-height: 1.3; text-align: center; }
        .chapter-quote { font-size: 1.2em; font-weight: bold; font-style: italic; text-align: center; }

        /* 阅读器 */
        .reader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 12, 41, 0.98); z-index: 1000; display: none;
            overflow-y: auto; padding: 60px 20px; backdrop-filter: blur(10px);
        }
        .reader-content {
            max-width: 850px; margin: 0 auto; 
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            padding: 60px; border-radius: 30px; 
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.05), inset 0 0 100px rgba(0,0,0,0.5);
            line-height: 2; font-size: 1.25em; color: #e0e0e0; 
            border: 1px solid rgba(255, 215, 0, 0.1); font-family: 'Georgia', 'Times New Roman', serif;
        }
        .reader-content h1 { 
            color: var(--gold); margin-bottom: 50px; text-align: center; font-size: 2.8em; 
            font-family: 'Microsoft YaHei', sans-serif; border-bottom: 2px solid rgba(255,215,0,0.2); padding-bottom: 20px;
        }
        .reader-content p { margin-bottom: 25px; text-align: justify; opacity: 0; animation: fadeInUp 0.5s forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .reader-content strong { color: #FFA500; font-weight: 700; text-shadow: 0 0 5px rgba(255,165,0,0.3); }
        
        /* 趣味数据榜单样式 */
        .fun-stats {
            margin-top: 50px; background: rgba(0, 0, 0, 0.3);
            border: 1px dashed var(--gold); padding: 30px; border-radius: 15px;
        }
        .fun-stats h2 { color: var(--gold); text-align: center; margin-bottom: 20px; font-family: 'Microsoft YaHei', sans-serif; }
        .stat-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .stat-label { color: #aaa; font-size: 0.9em; }
        .stat-value { color: #fff; font-weight: bold; font-size: 1.1em; }
        
        .close-btn {
            position: fixed; top: 30px; right: 40px; font-size: 3.5em;
            color: var(--gold); cursor: pointer; z-index: 1001; transition: all 0.3s;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .close-btn:hover { transform: rotate(90deg) scale(1.2); color: #fff; }
        
        /* 弹幕层 */
        .danmaku-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999; overflow: hidden;
        }
        .danmaku-item {
            position: absolute; white-space: nowrap;
            font-size: 1.2em; color: rgba(255, 255, 255, 0.8);
            text-shadow: 1px 1px 2px black;
            animation: danmakuMove 10s linear forwards;
        }
        @keyframes danmakuMove { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        /* 成就弹窗 */
        .achievement-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.9); border: 2px solid var(--gold);
            padding: 40px; border-radius: 20px; z-index: 2000; text-align: center;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .achievement-popup.show { transform: translate(-50%, -50%) scale(1); }
        .achievement-icon { font-size: 5em; margin-bottom: 20px; }
        
        /* 粒子背景 */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute; background: radial-gradient(circle, #FFD700, transparent); border-radius: 50%;
            animation: floatUp 20s infinite linear; opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="danmaku-layer" id="danmakuLayer"></div>
    
    <div class="container">
        <div class="header">
            <h1>⚽ 中国队世界杯夺冠传奇 ⚽</h1>
            <p>方毅与四皇的黄金时代 | THE GOAT 史诗篇章</p>
        </div>
        <div class="chapter-grid" id="chapterList"></div>
    </div>

    <div class="reader-overlay" id="readerOverlay">
        <div class="close-btn" onclick="closeReader()">×</div>
        <div class="reader-content" id="readerContent"></div>
    </div>

    <div class="achievement-popup" id="achievementPopup">
        <div class="achievement-icon">🐐</div>
        <h2 style="color: gold;">成就解锁：THE GOAT</h2>
        <p>你已见证中国足球的黄金时代！</p>
    </div>

    <script>
        const chaptersData = [
            { title: "第一章：上古神人的召唤", quote: "“足球，本质上是一场关于人性弱点的艺术。”", content: `方毅坐在那张被岁月磨得发亮的战术板前...` }, // 简化展示，实际内容同上
            { title: "第十章：SIUUU！新王登基", quote: "“这一声呐喊，穿透了百年的屈辱。”", content: `终场哨响的那一刻...` }
        ];

        // 3D 卡片生成逻辑
        const listContainer = document.getElementById('chapterList');
        chaptersData.forEach((chapter, index) => {
            const container = document.createElement('div');
            container.className = 'chapter-card-container';
            container.innerHTML = `
                <div class="chapter-card">
                    <div class="card-face card-front">
                        <div class="chapter-num">${index + 1}</div>
                        <div class="chapter-title">${chapter.title.split('：')[1]}</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="chapter-quote">${chapter.quote}</div>
                    </div>
                </div>
            `;
            container.onclick = () => openReader(index);
            listContainer.appendChild(container);
        });

        // 打字机效果与弹幕
        function openReader(index) {
            const overlay = document.getElementById('readerOverlay');
            const content = document.getElementById('readerContent');
            const chapter = chaptersData[index];
            
            overlay.scrollTop = 0;
            content.innerHTML = `<h1>${chapter.title}</h1>`;
            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden';

            // 模拟打字机逐段显示
            const paragraphs = chapter.content.split('\n');
            paragraphs.forEach((p, i) => {
                setTimeout(() => {
                    const pEl = document.createElement('p');
                    pEl.innerHTML = p.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    content.appendChild(pEl);
                    if (index === chaptersData.length - 1 && i === paragraphs.length - 1) {
                        showAchievement();
                    }
                }, i * 200);
            });

            startDanmaku();
        }

        function startDanmaku() {
            const comments = ["叶泽辉又转圈了！", "黄佳炀开始省电了！", "方毅教练 YYDS！", "这球进得也太玄学了！", "SIUUUUUU！"];
            const layer = document.getElementById('danmakuLayer');
            const comment = document.createElement('div');
            comment.className = 'danmaku-item';
            comment.innerText = comments[Math.floor(Math.random() * comments.length)];
            comment.style.top = Math.random() * 50 + '%';
            layer.appendChild(comment);
            setTimeout(() => comment.remove(), 10000);
        }

        function showAchievement() {
            document.getElementById('achievementPopup').classList.add('show');
            setTimeout(() => document.getElementById('achievementPopup').classList.remove('show'), 5000);
        }

        function closeReader() {
            document.getElementById('readerOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // 粒子特效
        for(let i=0; i<60; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = (Math.random() * 15 + 5) + 'px';
            p.style.animationDelay = Math.random() * 20 + 's';
            document.getElementById('particles').appendChild(p);
        }
    </script>
</body>
</html>
