<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin: 10px 0;
        }
        .success {
            color: #4ade80;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ 服务器正常运行!</h1>
        <p class="success">健身知识库重构版已成功启动</p>
        <p>请访问 <a href="/" style="color: #fbbf24; text-decoration: underline;">主页</a> 查看效果</p>
        <p style="margin-top: 30px; font-size: 0.9em; opacity: 0.8;">
            如果看到此页面,说明 Vite 开发服务器工作正常
        </p>
    </div>
</body>
</html>
