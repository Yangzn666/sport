<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库数据测试</title>
    <style>
        body {
            font-family: 'SimSun', serif;
            padding: 40px;
            background: #f5f5f5;
        }
        .test-result {
            background: white;
            padding: 30px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>知识库数据测试</h1>
    
    <div id="results"></div>
    
    <script src="knowledge_data.js"></script>
    <script>
        const results = document.getElementById('results');
        let html = '';
        
        // 测试1：检查knowledgeContents是否存在
        html += '<div class="test-result">';
        html += '<h2>测试1：数据文件加载</h2>';
        if (typeof knowledgeContents !== 'undefined') {
            html += '<p class="success">✅ knowledgeContents 已成功加载</p>';
            html += `<p>数据类型：${typeof knowledgeContents}</p>`;
            html += `<p>文档数量：${Object.keys(knowledgeContents).length}</p>`;
        } else {
            html += '<p class="error">❌ knowledgeContents 未定义</p>';
        }
        html += '</div>';
        
        // 测试2：列出所有文档
        if (typeof knowledgeContents !== 'undefined') {
            html += '<div class="test-result">';
            html += '<h2>测试2：文档列表</h2>';
            html += '<ul>';
            Object.keys(knowledgeContents).forEach(key => {
                const size = knowledgeContents[key].length;
                html += `<li><strong>${key}</strong> - ${size} 字符 (${(size/1024).toFixed(2)} KB)</li>`;
            });
            html += '</ul>';
            html += '</div>';
            
            // 测试3：显示第一个文档的前500字符
            const firstKey = Object.keys(knowledgeContents)[0];
            html += '<div class="test-result">';
            html += `<h2>测试3：示例内容（${firstKey}）</h2>`;
            html += '<pre>';
            html += knowledgeContents[firstKey].substring(0, 500) + '...';
            html += '</pre>';
            html += '</div>';
        }
        
        results.innerHTML = html;
    </script>
</body>
</html>
