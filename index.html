<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身与跑步科学知识库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
        }
        
        .main-card {
            background: white;
            border-radius: 16px;
            padding: 70px 60px 60px 60px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            max-width: 1100px;
            border: 1px solid rgba(0,0,0,0.06);
        }
        
        .main-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #2c3e50 0%, #3498db 50%, #2c3e50 100%);
        }
        
        /* 特色功能展示 */
        .features {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 50px 0 45px 0;
            position: relative;
            z-index: 1;
        }
        
        .feature-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 28px 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .feature-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #2c3e50 0%, #3498db 100%);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        
        .feature-item:hover {
            background: white;
            border-color: #cbd5e1;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            transform: translateY(-4px);
        }
        
        .feature-item:hover::before {
            transform: scaleX(1);
        }
        
        .feature-icon {
            font-size: 36px;
            margin-bottom: 16px;
            display: block;
        }
        
        .feature-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }
        
        .feature-desc {
            font-size: 13px;
            color: #64748b;
            line-height: 1.7;
        }
        
        h1 {
            font-size: 42px;
            color: #2c3e50;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            position: relative;
            z-index: 1;
        }
        
        .subtitle {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 50px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }
        
        .description {
            font-size: 16px;
            line-height: 1.9;
            color: #475569;
            margin-bottom: 50px;
            text-align: center;
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            z-index: 1;
        }
        
        .enter-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
            overflow: hidden;
        }
        
        .enter-btn {
            display: inline-block;
            background: #2c3e50;
            color: white;
            padding: 16px 48px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 12px rgba(44,62,80,0.15);
            border: 2px solid transparent;
        }
        
        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .enter-btn:hover::before {
            left: 100%;
        }
        
        .enter-btn:hover {
            background: white;
            color: #2c3e50;
            border-color: #2c3e50;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(44,62,80,0.2);
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #94a3b8;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .features {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            
            .main-card {
                padding: 50px 30px 40px 30px;
            }
            
            h1 {
                font-size: 32px;
            }
            
            .subtitle {
                font-size: 14px;
                margin-bottom: 40px;
            }
            
            .features {
                grid-template-columns: 1fr;
                gap: 15px;
                margin: 40px 0 35px 0;
            }
            
            .feature-item {
                padding: 24px 20px;
            }
            
            .description {
                font-size: 15px;
                margin-bottom: 40px;
            }
            
            .enter-btn {
                padding: 14px 40px;
                font-size: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .main-card {
                padding: 50px 25px 30px 25px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .subtitle {
                font-size: 15px;
            }
            
            .features {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .feature-item {
                padding: 18px 15px;
            }
            
            .description {
                font-size: 15px;
            }
            
            .enter-btn {
                padding: 16px 40px;
                font-size: 16px;
            }
        }
        
        /* 加载动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .main-card {
            animation: fadeInUp 1s ease-out, scaleIn 0.8s ease-out;
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 0;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <h1>健身与跑步科学知识库</h1>
            <p class="subtitle">Evidence-Based Fitness & Running Science</p>
            
            <!-- 特色功能展示 -->
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">📚</div>
                    <div class="feature-title">10大核心文档</div>
                    <div class="feature-desc">涵盖生理学、力量训练、有氧耐力等完整知识体系</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔬</div>
                    <div class="feature-title">40+权威文献</div>
                    <div class="feature-desc">引用2024-2026年最新PubMed研究文献</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📊</div>
                    <div class="feature-title">可视化图表</div>
                    <div class="feature-desc">Mermaid流程图、时序图直观展示复杂概念</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💡</div>
                    <div class="feature-title">实用方案</div>
                    <div class="feature-desc">每个理论配套实践示例和训练建议</div>
                </div>
            </div>
            
            <!-- 新增功能入口 -->
            <div style="margin: 30px 0; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                <a href="知识图谱.html" class="enter-btn" style="background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); font-size: 15px; padding: 12px 25px;">🕸️ 知识图谱</a>
                <a href="学习路径.html" class="enter-btn" style="background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%); font-size: 15px; padding: 12px 25px;">🗺️ 学习路径</a>
            </div>
            
            <p class="description">
                基于PubMed最新文献的自动化知识聚合平台。涵盖运动生理学、力量训练、有氧耐力、营养恢复等完整科学知识体系，为训练提供循证指导。
            </p>
            
            <a href="知识库文档.html" class="enter-btn">进入知识库 →</a>
        </div>
        
        <div class="footer">
            <p>本地静态版本 | 无需服务器 | 离线可用</p>
        </div>
    </div>
</body>
</html>
